<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self'" />
    <title>LiveNAT</title>
    <style>
      :root {
        --green: #4cffb0;
        --yellow: #ffcc00;
        --red: #ff5f6d;
        --bg: rgba(15, 20, 25, 0.92);
        --border: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.85);
        --dim: rgba(255, 255, 255, 0.4);
        --mono: "Consolas", "JetBrains Mono", monospace;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
      body { background: transparent; overflow: hidden; font-family: var(--mono); }

      .pill {
        width: 200px;
        height: 60px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        padding: 8px 14px;
        gap: 4px;
        cursor: grab;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 20px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--dim);
        flex-shrink: 0;
        transition: all 0.4s;
      }

      .label {
        font-size: 12px;
        font-weight: 700;
        color: var(--text);
        flex: 1;
      }

      .ms {
        font-size: 12px;
        font-weight: 600;
        color: var(--dim);
        font-variant-numeric: tabular-nums;
      }

      .spark { flex: 1; min-height: 0; }
      .spark svg { width: 100%; height: 100%; display: block; }
      .spark-line {
        fill: none;
        stroke: var(--green);
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
        transition: stroke 0.4s;
      }

      /* Status colors */
      [data-s="online"] .dot  { background: var(--green); box-shadow: 0 0 8px var(--green); }
      [data-s="slow"]   .dot  { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
      [data-s="offline"] .dot { background: var(--red); box-shadow: 0 0 8px var(--red); }

      [data-s="online"]  .spark-line { stroke: var(--green); }
      [data-s="slow"]    .spark-line { stroke: var(--yellow); }
      [data-s="offline"] .spark-line { stroke: var(--red); }

      [data-s="slow"]    .ms { color: var(--yellow); }
      [data-s="offline"] .ms { color: var(--red); }
      [data-s="offline"] .label { color: var(--red); }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      [data-s="offline"] .dot { animation: pulse 1.5s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div class="pill" data-s="offline">
      <div class="row">
        <span class="dot"></span>
        <span class="label">Offline</span>
        <span class="ms"></span>
      </div>
      <div class="spark">
        <svg viewBox="0 0 172 20" preserveAspectRatio="none">
          <path class="spark-line" d="" />
        </svg>
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
